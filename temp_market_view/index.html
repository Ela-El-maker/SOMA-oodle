<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              market: {
                bg: '#0f0720', // Deep Violet Void
                up: '#ff00ff', // Neon Pink/Magenta (Positive/Energy)
                upGlow: '#d946ef',
                down: '#312e81', // Deep Indigo (Negative/Drawdown)
                downGlow: '#4338ca',
                text: '#94a3b8',
                highlight: '#e2e8f0',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0f0720;
        color: #e2e8f0;
        overflow: hidden; /* Immersive feel */
      }
      /* Custom Scrollbar for hidden feel */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      .neon-glow-text {
        text-shadow: 0 0 10px currentColor; /* Uses the text color for glow */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",

    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "d3": "https://esm.sh/d3@^7.9.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</html>
