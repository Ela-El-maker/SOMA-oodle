<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <title>Soma: Dementia OS</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Space Grotesk', 'sans-serif'],
              mono: ['IBM Plex Mono', 'monospace'],
            },
            colors: {
              zinc: {
                850: '#1f2022',
                900: '#18181b',
                950: '#09090b', // Deep obsidian
              },
              accent: {
                DEFAULT: '#5eead4', // Soma mint
                glow: '#22d3ee'
              },
              soma: {
                bg: '#060607',
                panel: '#0d0f12',
                ink: '#cbd5f5'
              }
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'spin-slow': 'spin 12s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --soma-bg: #060607;
        --soma-panel: #0d0f12;
        --soma-border: rgba(255, 255, 255, 0.08);
        --soma-ink: #d6d6de;
        --soma-accent: #5eead4;
        --soma-accent-2: #22d3ee;
      }

      body {
        background: radial-gradient(1200px 800px at 70% -10%, rgba(34, 211, 238, 0.12), transparent 60%),
          radial-gradient(900px 700px at 10% 10%, rgba(94, 234, 212, 0.10), transparent 55%),
          #060607;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b; 
      }
      
      /* Glassmorphism Utilities */
      .glass {
        background: rgba(24, 24, 27, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .glass-panel {
        background: rgba(9, 9, 11, 0.8);
        backdrop-filter: blur(20px);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
      }

      .soma-card {
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }

      .soma-landing-bg {
        background: radial-gradient(1000px 700px at 70% -10%, rgba(34, 211, 238, 0.18), transparent 60%),
          radial-gradient(800px 600px at 5% 5%, rgba(94, 234, 212, 0.10), transparent 55%),
          linear-gradient(180deg, rgba(8, 9, 12, 0.98), rgba(6, 6, 7, 0.98));
      }

      .soma-landing-grid {
        background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 36px 36px;
        mask-image: radial-gradient(circle at center, rgba(0,0,0,0.7), transparent 70%);
      }

      .mint-shell,
      .mint-border,
      .mint-dark,
      .mint-glow {
        max-height: 70px;
        max-width: 100%;
        height: 100%;
        width: 100%;
        position: absolute;
        overflow: hidden;
        z-index: 0;
        border-radius: 999px;
        filter: blur(2px);
        pointer-events: none;
      }

      .mint-shell {
        max-height: 64px;
        max-width: 100%;
        border-radius: 999px;
        filter: blur(1px);
      }

      .mint-shell::before {
        content: "";
        z-index: -2;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(83deg);
        position: absolute;
        width: 800px;
        height: 800px;
        background-repeat: no-repeat;
        background-position: 0 0;
        filter: brightness(1.3);
        background-image: conic-gradient(
          rgba(0, 0, 0, 0) 0%,
          rgba(94, 234, 212, 0.8),
          rgba(0, 0, 0, 0) 12%,
          rgba(0, 0, 0, 0) 48%,
          rgba(34, 211, 238, 0.7),
          rgba(0, 0, 0, 0) 60%
        );
        transition: all 2s;
      }

      .mint-border {
        max-height: 60px;
        max-width: 100%;
        border-radius: 999px;
        filter: blur(0.5px);
      }

      .mint-border::before {
        content: "";
        z-index: -2;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(70deg);
        position: absolute;
        width: 800px;
        height: 800px;
        filter: brightness(1.2);
        background-repeat: no-repeat;
        background-position: 0 0;
        background-image: conic-gradient(
          rgba(10, 12, 14, 0.9),
          rgba(94, 234, 212, 0.9) 6%,
          rgba(10, 12, 14, 0.9) 16%,
          rgba(10, 12, 14, 0.9) 48%,
          rgba(34, 211, 238, 0.8) 60%,
          rgba(10, 12, 14, 0.9) 66%
        );
        transition: all 2s;
      }

      .mint-dark {
        max-height: 68px;
        max-width: 100%;
      }

      .mint-dark::before {
        content: "";
        z-index: -2;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(82deg);
        position: absolute;
        width: 800px;
        height: 800px;
        background-repeat: no-repeat;
        background-position: 0 0;
        background-image: conic-gradient(
          rgba(0, 0, 0, 0),
          rgba(34, 211, 238, 0.5),
          rgba(0, 0, 0, 0) 12%,
          rgba(0, 0, 0, 0) 50%,
          rgba(94, 234, 212, 0.6),
          rgba(0, 0, 0, 0) 62%
        );
        transition: all 2s;
      }

      .mint-glow {
        overflow: hidden;
        filter: blur(18px);
        opacity: 0.3;
        max-height: 96px;
        max-width: 100%;
      }

      .mint-glow::before {
        content: "";
        z-index: -2;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(60deg);
        position: absolute;
        width: 1200px;
        height: 1200px;
        background-repeat: no-repeat;
        background-position: 0 0;
        background-image: conic-gradient(
          rgba(0, 0, 0, 0),
          rgba(94, 234, 212, 0.8) 6%,
          rgba(0, 0, 0, 0) 35%,
          rgba(0, 0, 0, 0) 50%,
          rgba(34, 211, 238, 0.9) 62%,
          rgba(0, 0, 0, 0) 90%
        );
        transition: all 2s;
      }

      .mint-wrap:hover > .mint-dark::before,
      .mint-wrap:focus-within > .mint-dark::before {
        transform: translate(-50%, -50%) rotate(262deg);
        transition: all 4s;
      }

      .mint-wrap:hover > .mint-glow::before,
      .mint-wrap:focus-within > .mint-glow::before {
        transform: translate(-50%, -50%) rotate(240deg);
        transition: all 4s;
      }

      .mint-wrap:hover > .mint-shell::before,
      .mint-wrap:focus-within > .mint-shell::before {
        transform: translate(-50%, -50%) rotate(263deg);
        transition: all 4s;
      }

      .mint-wrap:hover > .mint-border::before,
      .mint-wrap:focus-within > .mint-border::before {
        transform: translate(-50%, -50%) rotate(250deg);
        transition: all 4s;
      }

      /* Logo Animation */
      .synapse-node {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
        box-shadow: 0 0 20px rgba(255,255,255,0.3);
      }
      
      .orbit-ring {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        position: absolute;
      }

      /* Premium Resonance Visuals */
      .text-glow {
        text-shadow: 0 0 10px rgba(94, 234, 212, 0.5), 0 0 20px rgba(94, 234, 212, 0.2);
      }

      .gold-glow {
        text-shadow: 0 0 10px rgba(251, 191, 36, 0.5), 0 0 20px rgba(251, 191, 36, 0.2);
      }

      .res-border {
        box-shadow: inset 0 0 15px rgba(99, 102, 241, 0.1), 0 0 5px rgba(99, 102, 241, 0.2);
      }

      @keyframes glitch-fade {
        0% { transform: translate(0); opacity: 0.8; }
        20% { transform: translate(-1px, 1px); opacity: 0.7; }
        40% { transform: translate(-1px, -1px); opacity: 0.8; }
        60% { transform: translate(1px, 1px); opacity: 0.7; }
        80% { transform: translate(1px, -1px); opacity: 0.8; }
        100% { transform: translate(0); opacity: 0.8; }
      }

      @keyframes heart-pop {
        0% { transform: scale(0); opacity: 0; }
        15% { transform: scale(1.2); opacity: 1; }
        30% { transform: scale(1); opacity: 1; }
        80% { transform: scale(1); opacity: 1; }
        100% { transform: scale(1.5); opacity: 0; }
      }

      @keyframes ping-once {
        0% { transform: scale(0.5); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: scale(1.5); opacity: 0; }
      }

      .animate-heart-pop {
        animation: heart-pop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      .animate-ping-once {
        animation: ping-once 0.8s ease-out forwards;
      }

      .decay-glitch {
        animation: glitch-fade 4s linear infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-zinc-950 text-zinc-100 antialiased overflow-x-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
